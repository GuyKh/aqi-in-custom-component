# This workflow uses Home Assistant's hassfest script to validate the component
# For more information see: https://developers.home-assistant.io/blog/2020/05/15/hassfest-action/

name: HassFest

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  hassfest:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install homeassistant
    - name: Run hassfest
      uses: home-assistant/actions/hassfest@master